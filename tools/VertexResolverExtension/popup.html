<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 10px; font-family: sans-serif; }
    .status { margin-top: 10px; font-weight: bold; }
    textarea { width: 100%; height: 100px; }
    button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; }
    #progress { margin-top: 10px; }
  </style>
</head>
<body>
  <h3>Vertex Resolver</h3>
  <p>Paste CSV content (URL per line):</p>
  <textarea id="csvInput" placeholder="https://vertexaisearch..."></textarea>
  <button id="startBtn">Start Resolving</button>
  <button id="downloadBtn" style="display:none;">Download Results (CSV)</button>
  <div id="progress"></div>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
